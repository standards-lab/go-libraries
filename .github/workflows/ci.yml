name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The module matrix grows with the repo: each new module is added here, to the
# go.work use-list, and to mise GO_MODULES together. Steps are guarded on the
# module's go.mod so a matrix entry stays green until that module lands.
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: go vet
        if: ${{ hashFiles(format('{0}/go.mod', matrix.module)) != '' }}
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test -race
        if: ${{ hashFiles(format('{0}/go.mod', matrix.module)) != '' }}
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  lint:
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: golangci-lint
        if: ${{ hashFiles(format('{0}/go.mod', matrix.module)) != '' }}
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ matrix.module }}
